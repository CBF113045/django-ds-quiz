{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="card auth-card">

    <h2>🔑 學生登入</h2>

    <form method="POST" class="auth-form">
        {% csrf_token %}

        <label>使用者名稱</label>
        <input type="text" name="username" placeholder="請輸入使用者名稱">

        <label>密碼</label>
        <input type="password" name="password" placeholder="請輸入密碼">

        <button class="btn primary" type="submit">登入</button>
    </form>

    <div class="auth-footer">
        <span>還沒有帳號？</span>
        <a href="{% url 'register' %}" class="auth-link">
            點我註冊帳號
        </a>
    </div>

</div>

{% endblock %}
