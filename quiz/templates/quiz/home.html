{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container">

    <div class="card">
        <h1>📚 資料結構第4章－陣列測驗網站</h1>
        <p>共 20 題選擇題測驗</p>
    </div>

    <!-- 使用者狀態 -->
    <div class="card">

        {% if request.user.is_authenticated %}
        <p>👋 您好，<strong>{{ request.user.username }}</strong></p>

        <div style="display:flex; gap:20px; flex-wrap:wrap;">

            <a class="btn" href="{% url 'wrong_questions' %}">
                📖 錯題本
            </a>

            <a class="btn secondary" href="{% url 'review_wrong_questions' %}">
                🧠 錯題複習
            </a>
            
        </div>

        {% else %}
        <p>📢 您目前是以【訪客身份】瀏覽，寫錯題目不會記錄喔！</p>

        <div style="display:flex; gap:20px; flex-wrap:wrap;">

            <a class="btn" href="{% url 'login' %}">登入</a>
            <a class="btn secondary" href="{% url 'register' %}">註冊</a>
                    
        </div>
        
        {% endif %}

    </div>

    <!-- 測驗開始 -->
    <div class="card">

        <form action="{% url 'start_quiz' %}" method="GET">

            <label>選擇題數</label>

            <select name="num">
                <option value="5">5 題</option>
                <option value="10">10 題</option>
                <option value="20">20 題</option>
            </select>

            <button class="btn primary" type="submit">
                🚀 開始測驗
            </button>

        </form>

    </div>

</div>

{% endblock %}
